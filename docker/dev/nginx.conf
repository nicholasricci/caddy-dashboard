events {
    # Max simultaneous connections per worker process.
    # Fine for a frontend/static + reverse-proxy container; raise only if you
    # expect high concurrent connection counts (e.g. many long-lived SSE/WS conns).
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- DNS resolver for dynamic upstream resolution ---------------------
    # 127.0.0.11 is Docker's embedded DNS resolver. It forwards queries to:
    #   - other containers/services on the same Docker network (dev/compose), or
    #   - the VPC DNS resolver (e.g. Route 53 Resolver) when running on
    #     ECS/Fargate/EC2, which is what lets this resolve internal ALB names.
    # valid=10s forces nginx to re-query DNS every 10s instead of caching the
    # resolver's own TTL — well under the ALB's ~60s Route 53 TTL, so nginx
    # picks up IP rotations quickly instead of using stale, possibly-dead IPs.
    # ipv6=off avoids wasted AAAA lookups if the backend is IPv4-only (typical
    # for internal ALBs); drop this if you actually need IPv6.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Access/error logging ----------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # --- Gzip compression for text-based assets -----------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;   # skip compressing tiny responses (not worth the CPU)
    gzip_proxied any;       # compress proxied responses too (e.g. from /api/)
    gzip_comp_level 6;      # balanced compression ratio vs CPU cost
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --- Backend upstream (API) --------------------------------------------
    # BACKEND_HOST/BACKEND_PORT are injected at container start via envsubst
    # (see Dockerfile: NGINX_ENVSUBST_OUTPUT_DIR + /etc/nginx/templates/).
    #
    # In dev: BACKEND_HOST = a Docker Compose service name (single, stable IP).
    # In prod: BACKEND_HOST = internal ALB DNS name (internal-*.elb.amazonaws.com),
    #          which resolves to MULTIPLE IPs (one per AZ) that AWS rotates
    #          periodically.
    #
    # zone backend 64k;
    #   Allocates shared memory for this upstream's runtime state (resolved IP
    #   list, health/weight info). REQUIRED for the "resolve" parameter below
    #   to work — without a zone, nginx can't dynamically update the server
    #   list after startup.
    #
    # server ... resolve;
    #   Without "resolve": nginx resolves the hostname ONCE at startup/reload
    #   and caches the resulting IP(s) for the container's entire lifetime.
    #   If the ALB rotates an IP out from under a long-running container,
    #   nginx keeps round-robining to a now-dead IP -> intermittent 502s/
    #   timeouts with NO trace in the backend's own logs (request never
    #   reaches a live target).
    #   With "resolve": nginx re-resolves in the background using the
    #   "resolver" directive above (every valid=10s), and updates the live
    #   upstream IP list without needing a restart/reload.
    upstream backend {
        zone backend 64k;
        server ${BACKEND_HOST}:${BACKEND_PORT} resolve;
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # --- Security headers ------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # NOTE: 'unsafe-inline' + broad http:/https:/data:/blob: sources is
        # permissive; fine for dev, consider tightening for production.
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # --- Reverse proxy to backend API ------------------------------------
        # Preserves the /api/... path as-is when forwarding to upstream "backend"
        # (i.e. no path rewriting here — backend must expect the same /api/ prefix).
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Short-circuit CORS preflight (OPTIONS) requests before they hit
            # the backend — avoids unnecessary upstream calls for preflight.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Generous timeouts — adjust downward if the API is expected to
            # respond quickly; 600s is suitable for long-running operations
            # but can mask a hung backend for a long time.
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # --- Long-term caching for static, fingerprinted assets --------------
        # Safe because Angular's production build fingerprints filenames
        # (e.g. main.a1b2c3.js), so a new deploy implies new filenames.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # --- Angular client-side routing fallback ----------------------------
        # Any path not matching a real file/dir falls back to index.html so
        # Angular's router can handle it client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Container health check endpoint ---------------------------------
        # Used by the Dockerfile HEALTHCHECK (wget --spider http://127.0.0.1/health).
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
