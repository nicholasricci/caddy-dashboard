name: 🐋 Build and push Docker image to GitHub Container Registry

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-caddy-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 👀 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: 🚪 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗡️ Extract metadata (tags, labels) for Docker CADDY DASHBOARD
        id: meta-caddy-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: 📦 Build and push Docker image for CADDY DASHBOARD
        uses: docker/build-push-action@v6
        id: push-caddy-dashboard
        with:
          context: .
          file: ./docker/dev/Dockerfile
          push: true
          tags: ${{ steps.meta-caddy-dashboard.outputs.tags }}
          labels: ${{ steps.meta-caddy-dashboard.outputs.labels }}

      - name: 📜 Digest certification for CADDY DASHBOARD
        run: echo ${{ steps.push-caddy-dashboard.outputs.digest }}
